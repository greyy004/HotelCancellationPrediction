<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - HamroGhar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/user_profile.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/flash.css') }}">
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar">
            <h2>User Dashboard</h2>
            <nav>
                <a href="{{ url_for('user_dashboard') }}">Dashboard</a>
                <a href="{{ url_for('my_bookings') }}">My Bookings</a>
                <a href="{{ url_for('user_profile') }}" class="active">Profile</a>
                <a href="{{ url_for('logout') }}" class="logout">Logout</a>
            </nav>
        </aside>

        <div class="main-content">
            <div class="profile-card">
                <h2>User Profile</h2>

                {% include "_flash_messages.html" %}
                <form method="POST" id="profileForm" action="{{ url_for('user_profile') }}">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" value="{{ user['name'] }}" required minlength="2">

                    <label for="phone">Phone</label>
                    <input type="text" id="phone" name="phone" value="{{ user['phone'] }}" pattern="[0-9]{7,15}" title="Enter 7 to 15 digits">

                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" value="{{ user['address'] }}" required minlength="3">

                    <label for="current_password">Current Password</label>
                    <input type="password" id="current_password" name="current_password" required minlength="8">

                    <button type="submit">Update Profile</button>
                </form>

            </div>
        </div>
    </div>
<script>
    const profileForm = document.getElementById("profileForm");
    profileForm.addEventListener("submit", (e) => {
        document.getElementById("name").value = document.getElementById("name").value.trim();
        document.getElementById("address").value = document.getElementById("address").value.trim();
        if (!profileForm.checkValidity()) {
            e.preventDefault();
            profileForm.reportValidity();
        }
    });
</script>
{% include "_flash_dismiss_script.html" %}
</body>

</html>
