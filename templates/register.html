<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Register - HamroGhar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/flash.css') }}" />
</head>

<body class="auth-page">
    <div class="auth-card">
        <h2>Create an account</h2>
        {% include "_flash_messages.html" %}
        <form id="registerForm" method="post" action="{{ url_for('register') }}">
            <div>
                <label for="name">Full Name</label>
                <input id="name" name="name" type="text" required minlength="2">
            </div>
            <div>
                <label for="phone">Phone</label>
                <input id="phone" name="phone" type="tel" pattern="[0-9]{7,15}" title="Enter 7 to 15 digits">
            </div>
            <div>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required>
            </div>
            <div>
                <label for="address">Address</label>
                <input id="address" name="address" type="text" required minlength="3">
            </div>
            <div>
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required minlength="8">
            </div>
            <div>
                <label for="confirm_password">Confirm Password</label>
                <input id="confirm_password" name="confirm_password" type="password" required minlength="8">
            </div>
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
<script>
    const registerForm = document.getElementById("registerForm");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirm_password");

    function validatePasswordMatch() {
        if (passwordInput.value !== confirmPasswordInput.value) {
            confirmPasswordInput.setCustomValidity("Passwords do not match.");
        } else {
            confirmPasswordInput.setCustomValidity("");
        }
    }

    passwordInput.addEventListener("input", validatePasswordMatch);
    confirmPasswordInput.addEventListener("input", validatePasswordMatch);

    registerForm.addEventListener("submit", (e) => {
        document.getElementById("name").value = document.getElementById("name").value.trim();
        document.getElementById("email").value = document.getElementById("email").value.trim();
        document.getElementById("address").value = document.getElementById("address").value.trim();
        validatePasswordMatch();
        if (!registerForm.checkValidity()) {
            e.preventDefault();
            registerForm.reportValidity();
        }
    });
</script>
{% include "_flash_dismiss_script.html" %}
</body>

</html>
